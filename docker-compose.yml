services:
  mysql:
    image: mysql:8.0
    container_name: marathon-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marathon
      MYSQL_USER: marathon
      MYSQL_PASSWORD: marathon
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - marathon-mysql-data:/var/lib/mysql
      - ./docs/sql:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: marathon-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: marathon-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: marathon
      RABBITMQ_DEFAULT_PASS: marathon
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    container_name: marathon-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - marathon-minio-data:/data

volumes:
  marathon-mysql-data:
  marathon-minio-data:
