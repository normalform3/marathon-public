spring:
  application:
    name: marathon-webapp
  datasource:
    url: ${MARATHON_DB_URL:jdbc:mysql://localhost:3306/marathon?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MARATHON_DB_USERNAME:marathon}
    password: ${MARATHON_DB_PASSWORD:marathon}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${MARATHON_REDIS_HOST:localhost}
      port: ${MARATHON_REDIS_PORT:6379}
      timeout: ${MARATHON_REDIS_TIMEOUT:5000}
      lettuce:
        pool:
          max-active: 20
          max-wait: -1
          max-idle: 20
          min-idle: 0
      password: ${MARATHON_REDIS_PASSWORD:}
  rabbitmq:
    host: ${MARATHON_RABBITMQ_HOST:localhost}
    port: ${MARATHON_RABBITMQ_PORT:5672}
    username: ${MARATHON_RABBITMQ_USERNAME:marathon}
    password: ${MARATHON_RABBITMQ_PASSWORD:marathon}
    virtual-host: ${MARATHON_RABBITMQ_VHOST:/}
    listener:
      simple:
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${MARATHON_MAIL_HOST:localhost}
    port: ${MARATHON_MAIL_PORT:1025}
    username: ${MARATHON_MAIL_USERNAME:}
    password: ${MARATHON_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${MARATHON_SERVER_PORT:8700}

minio:
  endpoint: ${MARATHON_MINIO_ENDPOINT:http://localhost:9000}
  bucketName: ${MARATHON_MINIO_BUCKET:marathon}
  access-key: ${MARATHON_MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MARATHON_MINIO_SECRET_KEY:minioadmin}

jwt:
  secret: ${MARATHON_JWT_SECRET:replace-with-a-long-random-local-secret}
  expire-seconds: ${MARATHON_JWT_EXPIRE_SECONDS:86400}
